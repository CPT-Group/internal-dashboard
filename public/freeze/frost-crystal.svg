<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g transform="translate(60,60)" stroke="rgba(180,225,255,0.55)" stroke-width="1.5" fill="none" filter="url(#glow)">
    <!-- 6-arm snowflake -->
    <line x1="0" y1="-46" x2="0" y2="46"/>
    <line x1="-39.8" y1="-23" x2="39.8" y2="23"/>
    <line x1="-39.8" y1="23" x2="39.8" y2="-23"/>
    <!-- Branch ticks on vertical arm -->
    <line x1="-10" y1="-26" x2="0" y2="-36"/>
    <line x1="10" y1="-26" x2="0" y2="-36"/>
    <line x1="-10" y1="26" x2="0" y2="36"/>
    <line x1="10" y1="26" x2="0" y2="36"/>
    <!-- Branch ticks on upper-right arm -->
    <line x1="19.4" y1="-28.4" x2="27.7" y2="-18.4"/>
    <line x1="25.4" y1="-24.4" x2="27.7" y2="-18.4"/>
    <!-- Branch ticks on upper-left arm -->
    <line x1="-19.4" y1="-28.4" x2="-27.7" y2="-18.4"/>
    <line x1="-25.4" y1="-24.4" x2="-27.7" y2="-18.4"/>
    <!-- Branch ticks on lower-right arm -->
    <line x1="19.4" y1="28.4" x2="27.7" y2="18.4"/>
    <line x1="25.4" y1="24.4" x2="27.7" y2="18.4"/>
    <!-- Branch ticks on lower-left arm -->
    <line x1="-19.4" y1="28.4" x2="-27.7" y2="18.4"/>
    <line x1="-25.4" y1="24.4" x2="-27.7" y2="18.4"/>
    <!-- Center hexagon -->
    <polygon points="0,-10 8.66,-5 8.66,5 0,10 -8.66,5 -8.66,-5" stroke="rgba(200,235,255,0.5)" stroke-width="1"/>
  </g>
</svg>
